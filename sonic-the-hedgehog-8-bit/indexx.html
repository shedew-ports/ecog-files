<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="viewport" content="width=496, user-scalable=no">
	<title>Sonic the Hedgehog</title>

	<!-- Local font instead of Google Fonts -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/fonts/press-start-2p.css">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/miracle.css" type="text/css">
	<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/sms-min.js"></script>
	<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/darrensongedeon-debug/Sonic-1-SMS-HTML5@main/assets/main.php?play=sonic"></script>
</head>
<body>

	<div id="holder">
		<div id="top_banner"></div>

		<div id="instructions" ontouchstart="is_mobile=true;" onclick="loadGame();">
			<!-- Removed external ad script -->
			<div style="width:100%;height:60px;background:#000;"></div>

			<img src="https://cdn.jsdelivr.net/gh/darrensongedeon-debug/Sonic-1-SMS-HTML5@main/logos/sonic.gif" style="width: 496px;height:324px;object-fit:cover;object-position:0 -22px;">

			<div style="position:absolute;top:300px;width:100%;">
				USE ARROW KEYS/WASD/Z/X<br>
				OR DPAD BELOW ON MOBILE<br>
				CLICK/TOUCH TO <span id="start_text">START</span>
				<div id="pause_menu" onclick="event.stopPropagation();" style="display:none;">
					<!-- Removed external links -->
					<span class="button" onclick="embedCode();" id="embed_button">ADD TO YOUR SITE</span>
					<div id="embed_code">
						Copy & paste this code:<br>
						<input type="text" style="width:365px;" value="<iframe src=&quot;./index.html&quot; style=&quot;width:496px;height:554px;border:none;&quot; frameborder=&quot;0&quot; scrolling=&quot;no&quot;></iframe>" onclick="this.select();">
					</div>
					<br>
				</div>
			</div>
		</div>

		<canvas id="screen" width="256" height="192" style="border-color: rgb(0, 0, 0);"></canvas>
		<img src="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/menu_icon.png" id="menu_icon" class="icon" onclick="toggleMenu();">
		<img src="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/audio_icon.png" id="audio_icon" class="icon" onclick="toggleAudio();">
	</div>

	<div id="dpad_area">
		<div id="dpad_left">
			<img id="dpad" src="https://cdn.jsdelivr.net/gh/darrensongedeon-debug/Sonic-1-SMS-HTML5@main/assets/dpad2.png" style="width:168px;">
		</div>

		<div id="dpad_info"></div>

		<div id="dpad_right">
			<div id="button_x" ontouchstart="dpadDown(90);" ontouchend="dpadUp(90);"></div>
		</div>
	</div>

	<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/ecog-ent/ecog-files@main/sonic-the-hedgehog-8-bit/assets/touch.js"></script>

	<!-- Removed external analytics script -->
	<!-- <script src="../ga.js"></script> -->
</body>
</html>
